<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MBTA Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --surface2: #1a1e2a;
      --border: #252836;
      --accent: #DA291C;      /* MBTA red */
      --accent2: #003DA5;     /* MBTA blue */
      --gold: #f5c518;
      --text: #e8eaf0;
      --muted: #6b7280;
      --mono: 'DM Mono', monospace;
      --serif: 'DM Serif Display', serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(218,41,28,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(218,41,28,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -50%;
      left: -20%;
      width: 60%;
      height: 80%;
      background: radial-gradient(ellipse, rgba(0,61,165,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    @keyframes gridMove {
      from { transform: translateY(0); }
      to { transform: translateY(48px); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 600px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 0.5rem;
    }

    .t-logo {
      width: 44px;
      height: 44px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--serif);
      font-size: 1.4rem;
      color: white;
      flex-shrink: 0;
      box-shadow: 0 0 24px rgba(218,41,28,0.4);
    }

    .eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      font-family: var(--serif);
      font-size: clamp(2.2rem, 6vw, 3.2rem);
      line-height: 1.05;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .field-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
      display: block;
    }

    .input-wrap {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(218,41,28,0.15);
    }

    input[type="text"] {
      flex: 1;
      background: var(--surface2);
      border: none;
      outline: none;
      padding: 0.85rem 1rem;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.9rem;
    }

    input[type="text"]::placeholder {
      color: var(--muted);
    }

    button[type="submit"] {
      background: var(--accent);
      border: none;
      padding: 0.85rem 1.4rem;
      color: white;
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    button[type="submit"]:hover { background: #b82014; }
    button[type="submit"]:active { transform: scale(0.98); }

    .error-box {
      margin-top: 1.2rem;
      background: rgba(218,41,28,0.08);
      border: 1px solid rgba(218,41,28,0.3);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.8rem;
      color: #f87171;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .examples {
      margin-top: 1.5rem;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .examples span {
      color: var(--accent2);
      cursor: pointer;
      transition: color 0.15s;
    }

    .examples span:hover { color: #6b9dff; }

    footer {
      position: relative;
      z-index: 1;
      margin-top: 2rem;
      font-size: 0.65rem;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-row">
      <div class="t-logo">T</div>
      <div>
        <div class="eyebrow">Massachusetts Bay Transportation Authority</div>
      </div>
    </div>

    <h1>Find your nearest<br><em>T stop.</em></h1>
    <p class="subtitle">Enter any Boston address or landmark — we'll find<br>the closest MBTA station.</p>

    <div class="card">
      <form action="/find" method="POST">
        <label class="field-label" for="place">Location</label>
        <div class="input-wrap">
          <input
            type="text"
            id="place"
            name="place"
            placeholder="e.g. Fenway Park, Boston Common…"
            value="{{ place or '' }}"
            autocomplete="off"
            autofocus
          />
          <button type="submit">Find →</button>
        </div>
      </form>

      {% if error %}
      <div class="error-box">
        ⚠ {{ error }}
      </div>
      {% endif %}

      <div class="examples">
        Try: 
        <span onclick="document.getElementById('place').value='Boston Common'">Boston Common</span>,&nbsp;
        <span onclick="document.getElementById('place').value='Fenway Park'">Fenway Park</span>,&nbsp;
        <span onclick="document.getElementById('place').value='MIT Cambridge'">MIT</span>,&nbsp;
        <span onclick="document.getElementById('place').value='Logan Airport'">Logan Airport</span>
      </div>
    </div>
  </div>

  <footer>MBTA FINDER &nbsp;·&nbsp; POWERED BY MAPBOX + MBTA V3 API</footer>
</body>
</html>
